name: SonarQube Cloud

on:
  push:
    branches:
      - main
      - master
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  sonarcloud:
    name: Build, P3C PMD, and SonarQube Cloud
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: yundoc_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build and generate PMD report
        env:
          LOCAL_MYSQL_HOST: 127.0.0.1
          LOCAL_MYSQL_PORT: 3306
          LOCAL_MYSQL_USERNAME: root
          LOCAL_MYSQL_PASSWORD: ""
          LOCAL_MYSQL_TEST_DATABASE: yundoc_test
        run: |
          chmod +x ./mvnw
          ./mvnw -B verify pmd:pmd

      - name: Generate Yundoc external security report
        run: python scripts/sonar_external_issues.py

      - name: SonarQube Cloud scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw -B sonar:sonar \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }} \
            -Dsonar.projectKey=a1351995160_yungateway \
            -Dsonar.projectName=yungateway \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.java.pmd.reportPaths=target/pmd.xml \
            -Dsonar.externalIssuesReportPaths=target/yundoc-external-issues.json

spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:yundoc_local;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password:
  h2:
    console:
      enabled: true

yundoc:
  jwt:
    issuer: yundoc-gateway-local
    audience: yundoc-business-systems-local
    ttl: 30m


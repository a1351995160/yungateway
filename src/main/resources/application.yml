spring:
  application:
    name: wps-yundoc-capability-gateway

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
      group:
        readiness:
          include: readinessState,yundocConfiguration,db
  endpoints:
    web:
      exposure:
        include: health,info,metrics

yundoc:
  readiness:
    tdsql-required: true
  wps-client:
    preview-path: /api/preview-links
    token-path: /oauth/token
    file-list-path: /api/user/files
    authorize-path: /oauth/authorize
    user-token-path: /oauth/user-token
    preview-allowed-hosts: ${YUNDOC_WPS_PREVIEW_ALLOWED_HOSTS:}
    preview-expire-skew: 1m
  wps-credential:
    max-user-token-count: 10000
  wps-user-authorization:
    max-state-count: 10000
  user-assertion:
    secret: ${YUNDOC_USER_ASSERTION_SECRET:}
    key-id: ${YUNDOC_USER_ASSERTION_KEY_ID:v1}
    timestamp-tolerance: 5m
    max-nonce-count: 10000

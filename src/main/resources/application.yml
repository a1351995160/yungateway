spring:
  application:
    name: wps-yundoc-capability-gateway
  flyway:
    enabled: true
    locations: classpath:db/migration

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
      group:
        readiness:
          include: readinessState,yundocConfiguration,db
  endpoints:
    web:
      exposure:
        include: health,info,metrics

yundoc:
  readiness:
    tdsql-required: true

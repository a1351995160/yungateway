spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:yundoc_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password:

management:
  endpoint:
    health:
      show-details: always

yundoc:
  jwt:
    issuer: yundoc-gateway-test
    audience: yundoc-business-systems-test
    ttl: 30m

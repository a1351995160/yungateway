    url: jdbc:h2:mem:yundoc_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password:

management:
  endpoint:
    health:
      show-details: always

yundoc:
  admin-auth:
    username: admin
    password-digest: e5cc16751bf7202ac04ec29635ca6ff74832220ac2162f15b20218337bba24b7
    password-salt: admin-salt
    password-algorithm: HMAC-SHA256
    jwt-secret: test-admin-jwt-secret-with-enough-length
